<div class="page"><h2>Appointments List</h2><div class="search-box"><input type="number" placeholder="Patient ID" [(ngModel)]="patientId"><button (click)="getAppointmentsByPatientId()">Search Patient Appointments</button><button (click)="getAllAppointments()">All</button></div><div *ngIf="appointments.length == 0" class="empty">No appointments found.</div><div class="table-container" *ngIf="appointments.length > 0"><table><tr><th>ID</th><th>Doctor</th><th>Patient</th><th>Appointment Date</th><th>End Date</th><th>Action</th></tr><tr *ngFor="let a of appointments"><td>{{ a.id }}</td><td>{{ getDoctorName(a.doctorId) }}</td><td>{{ getPatientName(a.patientId) }}</td><td>{{ a.appointmentDate }}</td><td><span *ngIf="a.endDate">{{ a.endDate }}</span><span *ngIf="!a.endDate" class="badge badge-no">In progress</span></td><td><button class="success" *ngIf="!a.endDate" (click)="completeAppointment(a.id)">Complete</button></td></tr></table></div></div>
