<div class="page"><h2>Liste des tours</h2><div class="search-box"><input type="number" placeholder="ID adhérent" [(ngModel)]="adherentId"><button (click)="getToursByIDAdherant()">Chercher tours adhérent</button><button (click)="getAllTours()">Tous</button></div><div *ngIf="tours.length == 0" class="empty">Aucun tour trouvé.</div><div class="table-container" *ngIf="tours.length > 0"><table><tr><th>ID</th><th>Vélo ID</th><th>Adhérent ID</th><th>Date emprunt</th><th>Date retour</th><th>Action</th></tr><tr *ngFor="let t of tours"><td>{{ t.id }}</td><td>{{ t.veloId }}</td><td>{{ t.adherentId }}</td><td>{{ t.date_emp }}</td><td><span *ngIf="t.date_retour">{{ t.date_retour }}</span><span *ngIf="!t.date_retour" class="badge badge-no">En cours</span></td><td><button class="success" *ngIf="!t.date_retour" (click)="retournerTour(t.id)">Retourner</button></td></tr></table></div></div>
