<div class="page"><h2>Ajouter un adhérent</h2>
<form [formGroup]="form">
  <mat-form-field appearance="outline"><input matInput placeholder="nom" formControlName="nom"></mat-form-field>
  <mat-form-field appearance="outline"><input matInput placeholder="prenom" formControlName="prenom"></mat-form-field>
  <mat-form-field appearance="outline"><input matInput placeholder="cin" formControlName="cin"></mat-form-field>
  <mat-form-field appearance="outline"><input matInput placeholder="email" formControlName="email"></mat-form-field>
  <mat-form-field appearance="outline"><input matInput placeholder="tel" formControlName="tel"></mat-form-field>
  <mat-form-field appearance="outline"><input matInput placeholder="adresse" formControlName="adresse"></mat-form-field>
  <button mat-raised-button color="primary" type="button" (click)="ajouterAdherant()">Ajouter</button>
</form></div>
