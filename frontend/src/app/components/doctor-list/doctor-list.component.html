<div class="page">
  <h2>Doctors List</h2>
  <div class="search-box">
    <input
      type="number"
      placeholder="Search by ID"
      [(ngModel)]="doctorId"
    /><input
      type="number"
      placeholder="Patient ID for appointment"
      [(ngModel)]="patientId"
    /><button (click)="getDoctorById()">Search</button
    ><button (click)="getAllDoctors()">All</button>
  </div>
  <div *ngIf="doctors.length == 0" class="empty">No doctors found.</div>
  <div class="table-container" *ngIf="doctors.length > 0">
    <table>
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Specialty</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      <tr *ngFor="let d of doctors">
        <td>{{ d.id }}</td>
        <td>{{ d.firstName }}</td>
        <td>{{ d.lastName }}</td>
        <td>{{ d.specialty }}</td>
        <td>{{ d.email }}</td>
        <td>{{ d.phone }}</td>
        <td>
          <span class="badge badge-ok" *ngIf="d.available == 1">Available</span
          ><span class="badge badge-no" *ngIf="d.available == 0">Busy</span>
        </td>
        <td>
          <button
            *ngIf="d.available == 1"
            (click)="bookAppointment(d.id, patientId)"
          >
            Book
          </button>
          <a
            class="btn"
            *ngIf="authService.isAdmin()"
            [routerLink]="['/doctors/edit', d.id]"
            >Edit</a
          >
          <button
            class="danger"
            *ngIf="authService.isAdmin()"
            (click)="deleteDoctor(d.id)"
          >
            Delete
          </button>
        </td>
      </tr>
    </table>
  </div>
</div>
