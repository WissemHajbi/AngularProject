<div class="page"><h2>Liste des adhérents</h2><div class="search-box"><input type="number" placeholder="Chercher par ID" [(ngModel)]="adherentId"><button (click)="chercherAdherentParId()">Chercher</button><button (click)="getAllAdherents()">Tous</button></div><div *ngIf="adherents.length == 0" class="empty">Aucun adhérent trouvé.</div><div class="table-container" *ngIf="adherents.length > 0"><table><tr><th>ID</th><th>Nom</th><th>Prénom</th><th>CIN</th><th>Email</th><th>Tél</th><th>Adresse</th><th>Vélos en cours</th><th>Action</th></tr><tr *ngFor="let a of adherents"><td>{{ a.id }}</td><td>{{ a.nom }}</td><td>{{ a.prenom }}</td><td>{{ a.cin }}</td><td>{{ a.email }}</td><td>{{ a.tel }}</td><td>{{ a.adresse }}</td><td>{{ a.nbVeloencours }}</td><td><button class="danger" (click)="supprimerAdherent(a.id)">Supprimer</button></td></tr></table></div></div>
