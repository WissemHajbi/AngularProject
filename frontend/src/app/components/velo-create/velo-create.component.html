<div class="page"><h2>Ajouter un vélo</h2><form><mat-form-field appearance="outline"><input matInput placeholder="marque" [(ngModel)]="v.marque" name="marque"></mat-form-field><mat-form-field appearance="outline"><input matInput placeholder="couleur" [(ngModel)]="v.couleur" name="couleur"></mat-form-field><mat-form-field appearance="outline"><input matInput type="number" placeholder="etat (0 disponible, 1 emprunté)" [(ngModel)]="v.etat" name="etat"></mat-form-field><button mat-raised-button color="primary" type="button" (click)="ajouterVelo()">Ajouter</button></form></div>
